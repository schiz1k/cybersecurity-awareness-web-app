<svg width="1680" height="1220" viewBox="0 0 1680 1220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1680" y2="1220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#10254A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#13284F"/>
      <stop offset="1" stop-color="#0C1B35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020817" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60A5FA"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px Inter, Arial, sans-serif; fill: #CBD5E1; }
      .group { font: 700 14px Inter, Arial, sans-serif; fill: #93C5FD; letter-spacing: 0.08em; text-transform: uppercase; }
      .table-title { font: 700 18px Inter, Arial, sans-serif; fill: #F8FAFC; }
      .table-line { font: 500 13px Inter, Arial, sans-serif; fill: #CBD5E1; }
      .pk { fill: #93C5FD; }
      .fk { fill: #60A5FA; }
      .hint { font: 500 12px Inter, Arial, sans-serif; fill: #94A3B8; }
      .legend { font: 600 13px Inter, Arial, sans-serif; fill: #CBD5E1; }
    </style>
  </defs>

  <rect width="1680" height="1220" rx="28" fill="url(#bg)"/>

  <text x="72" y="70" class="title">Cyber Arena — схема базы данных</text>
  <text x="72" y="98" class="subtitle">PostgreSQL-модель: пользователи, сессии, тесты, материалы, прогресс и рейтинг</text>

  <text x="72" y="148" class="group">Auth и пользователи</text>
  <text x="72" y="454" class="group">Материалы и обучение</text>
  <text x="760" y="148" class="group">Тесты и интерактивные сценарии</text>
  <text x="760" y="734" class="group">Результаты и аналитика</text>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="300" height="210" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="96" y="204" class="table-title">users</text>
    <text x="96" y="230" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="96" y="252" class="table-line">email : text unique</text>
    <text x="96" y="274" class="table-line">password_hash : text</text>
    <text x="96" y="296" class="table-line">display_name : text</text>
    <text x="96" y="318" class="table-line">city : text</text>
    <text x="96" y="340" class="table-line">primary_track : text</text>
    <text x="96" y="362" class="table-line">role : app_role</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="170" width="250" height="170" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="426" y="204" class="table-title">user_sessions</text>
    <text x="426" y="230" class="table-line"><tspan class="pk">PK</tspan> token : text</text>
    <text x="426" y="252" class="table-line"><tspan class="fk">FK</tspan> user_id : uuid</text>
    <text x="426" y="274" class="table-line">created_at : timestamptz</text>
    <text x="426" y="296" class="table-line">expires_at : timestamptz</text>
    <text x="426" y="318" class="table-line">revoked_at : timestamptz</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="360" width="250" height="130" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="426" y="394" class="table-title">teams</text>
    <text x="426" y="420" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="426" y="442" class="table-line">name : text unique</text>
    <text x="426" y="464" class="table-line">city : text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="476" width="300" height="180" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="96" y="510" class="table-title">materials</text>
    <text x="96" y="536" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="96" y="558" class="table-line">slug : text unique</text>
    <text x="96" y="580" class="table-line">title : text</text>
    <text x="96" y="602" class="table-line">category : text</text>
    <text x="96" y="624" class="table-line">level : difficulty_level</text>
    <text x="96" y="646" class="table-line">status : content_status</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="520" width="250" height="120" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="426" y="554" class="table-title">material_sections</text>
    <text x="426" y="580" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="426" y="602" class="table-line"><tspan class="fk">FK</tspan> material_id : uuid</text>
    <text x="426" y="624" class="table-line">body_markdown : text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="660" width="250" height="120" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="426" y="694" class="table-title">material_highlights</text>
    <text x="426" y="720" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="426" y="742" class="table-line"><tspan class="fk">FK</tspan> material_id : uuid</text>
    <text x="426" y="764" class="table-line">value : text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="700" width="300" height="120" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="96" y="734" class="table-title">material_bookmarks</text>
    <text x="96" y="760" class="table-line"><tspan class="fk">FK</tspan> user_id : uuid</text>
    <text x="96" y="782" class="table-line"><tspan class="fk">FK</tspan> material_id : uuid</text>
    <text x="96" y="804" class="table-line">created_at : timestamptz</text>
  </g>

  <g filter="url(#shadow)">
