    <text x="96" y="900" class="table-line"><tspan class="fk">FK</tspan> user_id : uuid</text>
    <text x="96" y="922" class="table-line"><tspan class="fk">FK</tspan> material_id : uuid</text>
    <text x="96" y="944" class="table-line">status : progress_status</text>
    <text x="96" y="966" class="table-line">completed_at : timestamptz</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="170" width="320" height="220" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="784" y="204" class="table-title">tests</text>
    <text x="784" y="230" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="784" y="252" class="table-line">slug : text unique</text>
    <text x="784" y="274" class="table-line">title : text</text>
    <text x="784" y="296" class="table-line">category : text</text>
    <text x="784" y="318" class="table-line">difficulty : difficulty_level</text>
    <text x="784" y="340" class="table-line">mode : test_mode</text>
    <text x="784" y="362" class="table-line">status : content_status</text>
    <text x="784" y="384" class="table-line">config_json : jsonb</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="170" width="250" height="140" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="1134" y="204" class="table-title">test_benefits</text>
    <text x="1134" y="230" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="1134" y="252" class="table-line"><tspan class="fk">FK</tspan> test_id : uuid</text>
    <text x="1134" y="274" class="table-line">value : text</text>
    <text x="1134" y="296" class="table-line">sort_order : integer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="330" width="250" height="140" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="1134" y="364" class="table-title">test_deck_items</text>
    <text x="1134" y="390" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="1134" y="412" class="table-line"><tspan class="fk">FK</tspan> test_id : uuid</text>
    <text x="1134" y="434" class="table-line">value : text</text>
    <text x="1134" y="456" class="table-line">sort_order : integer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="430" width="320" height="160" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="784" y="464" class="table-title">test_questions</text>
    <text x="784" y="490" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="784" y="512" class="table-line"><tspan class="fk">FK</tspan> test_id : uuid</text>
    <text x="784" y="534" class="table-line">prompt : text</text>
    <text x="784" y="556" class="table-line">explanation : text</text>
    <text x="784" y="578" class="table-line">sort_order : integer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="510" width="250" height="160" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="1134" y="544" class="table-title">test_question_options</text>
    <text x="1134" y="570" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="1134" y="592" class="table-line"><tspan class="fk">FK</tspan> question_id : uuid</text>
    <text x="1134" y="614" class="table-line">label : text</text>
    <text x="1134" y="636" class="table-line">is_correct : boolean</text>
    <text x="1134" y="658" class="table-line">sort_order : integer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="756" width="320" height="180" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="784" y="790" class="table-title">test_attempts</text>
    <text x="784" y="816" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="784" y="838" class="table-line"><tspan class="fk">FK</tspan> test_id : uuid</text>
    <text x="784" y="860" class="table-line"><tspan class="fk">FK</tspan> user_id : uuid</text>
    <text x="784" y="882" class="table-line">score : integer</text>
    <text x="784" y="904" class="table-line">label : text</text>
    <text x="784" y="926" class="table-line">tier_name : text</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="780" width="250" height="160" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="1134" y="814" class="table-title">attempt_answers</text>
    <text x="1134" y="840" class="table-line"><tspan class="pk">PK</tspan> id : uuid</text>
    <text x="1134" y="862" class="table-line"><tspan class="fk">FK</tspan> attempt_id : uuid</text>
    <text x="1134" y="884" class="table-line"><tspan class="fk">FK</tspan> question_id : uuid</text>
    <text x="1134" y="906" class="table-line"><tspan class="fk">FK</tspan> selected_option_id : uuid</text>
    <text x="1134" y="928" class="table-line">is_correct : boolean</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1410" y="760" width="210" height="120" rx="22" fill="url(#card)" stroke="#3B82F6" stroke-opacity="0.32"/>
    <text x="1434" y="794" class="table-title">leaderboard_current</text>
    <text x="1434" y="820" class="table-line">user_id</text>
    <text x="1434" y="842" class="table-line">best_score</text>
    <text x="1434" y="864" class="table-line">tier_name</text>
  </g>

  <path d="M372 246 C 390 246, 386 246, 402 246" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M372 340 C 420 340, 360 424, 402 424" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M372 564 C 386 564, 390 580, 402 580" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M372 566 C 420 566, 380 720, 402 720" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M222 476 C 222 430, 222 410, 222 380" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M222 700 C 222 680, 222 668, 222 656" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M222 840 C 222 826, 222 824, 222 820" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M372 760 C 560 760, 560 846, 760 846" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M372 906 C 560 906, 560 860, 760 860" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1080 250 C 1094 250, 1098 250, 1110 250" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 340 C 1098 340, 1090 400, 1110 400" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M920 390 C 920 406, 920 416, 920 430" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 510 C 1098 510, 1090 590, 1110 590" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M920 590 C 920 650, 920 698, 920 756" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1080 846 C 1094 846, 1098 846, 1110 846" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M920 590 C 1160 590, 980 884, 1110 884" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1235 670 C 1235 724, 1235 740, 1235 780" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M1080 838 C 1240 838, 1260 820, 1410 820" stroke="#60A5FA" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="72" y="1040" width="540" height="120" rx="20" fill="#0B1730" fill-opacity="0.7" stroke="#3B82F6" stroke-opacity="0.18"/>
  <circle cx="108" cy="1078" r="7" fill="#93C5FD"/>
  <text x="126" y="1083" class="legend">PK — первичный ключ</text>
  <circle cx="108" cy="1112" r="7" fill="#60A5FA"/>
  <text x="126" y="1117" class="legend">FK — внешний ключ</text>
  <text x="72" y="1008" class="group">Легенда</text>

  <rect x="760" y="1040" width="820" height="120" rx="20" fill="#0B1730" fill-opacity="0.7" stroke="#3B82F6" stroke-opacity="0.18"/>
  <text x="784" y="1078" class="legend">Ключевая логика схемы:</text>
  <text x="784" y="1104" class="hint">1. Пользователь создаёт сессию через user_sessions и работает в системе как авторизованный участник.</text>
  <text x="784" y="1128" class="hint">2. Контент разделён на две доменные области: tests и materials.</text>
  <text x="784" y="1152" class="hint">3. Рейтинг строится из best_score пользователя на основе таблицы test_attempts и представления leaderboard_current.</text>
</svg>
